name: PowerHouse Stealth Deployer (Cedric Blazer)

on:
  repository_dispatch:
    types: [tickle_deploy]

jobs:
  # ENSURE ALL STEPS ARE UNDER ONE SINGLE JOB
  execute_payload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Identity Audit
        run: |
          UA="${{ github.event.client_payload.user_agent }}"
          echo "VERIFIED IDENTITY DATA:"
          curl -s -A "$UA" https://ifconfig.me/all.json 

      - name: Run Deployment Script
        run: |
          chmod +x ./powerhouse_script.sh
          # This must run immediately after the audit
          ./powerhouse_script.sh \
            "${{ secrets.RENDER_API_KEY }}" \
            "${{ secrets.GITLAB_URL }}" \
            "${{ github.event.client_payload.run_count }}"
