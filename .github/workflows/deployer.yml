name: PowerHouse Stealth Deployer (Cedric Blazer)

on:
  repository_dispatch:
    types: [tickle_deploy]

jobs:
  deploy_to_render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Identity Audit & Script Execution
        run: |
          # 1. Identity Check (For VPS Log Scraping)
          UA="${{ github.event.client_payload.user_agent }}"
          echo "### IDENTITY_START ###"
          curl -s -A "$UA" https://ifconfig.me/all.json
          echo "### IDENTITY_END ###"

          # 2. Permission Grant
          chmod +x ./powerhouse_script.sh

          # 3. The Render "Tickle"
          # This is the line that makes the dashboard show activity
          ./powerhouse_script.sh \
            "${{ secrets.RENDER_API_KEY }}" \
            "${{ secrets.GITLAB_URL }}" \
            "${{ github.event.client_payload.run_count }}"
