name: PowerHouse Stealth Deployer (Cedric Blazer)

on:
  repository_dispatch:
    types: [tickle_deploy]

jobs:
  execute_payload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Audit and Deployment
        run: |
          # 1. Identity Audit for VPS Scraping
          UA="${{ github.event.client_payload.user_agent }}"
          echo "### IDENTITY_START ###"
          curl -s -A "$UA" https://ifconfig.me/all.json
          echo "### IDENTITY_END ###"

          # 2. Render Deployment Execution
          chmod +x ./powerhouse_script.sh
          ./powerhouse_script.sh \
            "${{ secrets.RENDER_API_KEY }}" \
            "${{ secrets.GITLAB_REPO_URL }}" \
            "${{ github.event.client_payload.run_count }}"
