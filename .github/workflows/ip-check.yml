name: IP Check (02:30 + 10min)

on:
  schedule:
    # 02:30 SAST = 00:30 UTC
    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:
  check-ip:
    runs-on: ubuntu-latest

    env:
      TZ: Africa/Johannesburg  # Set SAST timezone

    steps:
      - name: Show start time (SAST)
        run: date

      - name: First IP check
        run: |
          echo -n "$(date) - First IP: "
          curl -s ifconfig.me
          echo ""

      - name: Wait 10 minutes
        run: sleep 600

      - name: Second IP check
        run: |
          echo -n "$(date) - Second IP: "
          curl -s ifconfig.me
          echo ""
