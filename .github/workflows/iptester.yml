name: Scheduled IP Tester
on:
  schedule:
    - cron: '16 0 * * *'

jobs:
  check_ip:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for 10 Minutes
        run: |
          echo "Clock started at $(date). Sleeping for 600 seconds..."
          sleep 600

      - name: Reveal Assigned IP
        run: |
          echo "Current Time: $(date)"
          echo "Assigned IP: $(curl -s https://ifconfig.me)"
          echo "### 🌐 Schedule Test Result" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | Scheduled Fire Success |" >> $GITHUB_STEP_SUMMARY
          echo "| **Final IP** | \`$(curl -s https://ifconfig.me)\` |" >> $GITHUB_STEP_SUMMARY
